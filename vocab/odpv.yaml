schema: https://opendataproducts.org/odpv-v1.0/schema/odpv.schema.json
version: 1.0.0
id: ODPV
name:
  en: Open Data Product Vocabulary
description:
  en: Shared vocabulary for the OpenDataProducts.org standards family.

license:
  name: Apache 2.0
  url: https://www.apache.org/licenses/LICENSE-2.0

publisher:
  name: Open Data Product Initiative
  umbrella: Linux Foundation
  url: https://opendataproducts.org

sections:
  - id: core
    name:
      en: ODPV Core
    description:
      en: Foundational terms used across the Open Data Products specification family.
    terms:
      - id: DataProduct
        uri: https://opendataproducts.org/odpv-v1.0/terms/DataProduct
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Data Product
        definition:
          en: A managed data offering designed for reuse, with defined ownership, access, quality, usage terms, and value context.
        alsoKnownAs:
          en:
            - data product
            - data offering
            - reusable data asset
            - data product asset
        relatedTerms:
          - Dataset
          - DataService
          - Distribution
        usedIn:
          - ODPS
          - ODPC
          - ODPG

      - id: DataProductCatalog
        uri: https://opendataproducts.org/odpv-v1.0/terms/DataProductCatalog
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Data Product Catalog
        definition:
          en: A managed collection of data products and related portfolio objects, such as use cases, objectives, KPIs, signals, and references.
        alsoKnownAs:
          en:
            - data catalog
            - product catalog
            - data product portfolio
            - portfolio catalog
        relatedTerms:
          - DataProduct
          - DataProductGraph
          - Reference
        usedIn:
          - ODPC
          - ODPG

      - id: DataProductGraph
        uri: https://opendataproducts.org/odpv-v1.0/terms/DataProductGraph
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Data Product Graph
        definition:
          en: A graph representation that connects data products, catalogs, use cases, objectives, KPIs, signals, and governance objects through defined relationships.
        alsoKnownAs:
          en:
            - data product graph
            - portfolio graph
            - knowledge graph
            - product relationship graph
        relatedTerms:
          - DataProductCatalog
          - Reference
          - Relationship
        usedIn:
          - ODPG

      - id: Dataset
        uri: https://opendataproducts.org/odpv-v1.0/terms/Dataset
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Dataset
        definition:
          en: A structured collection of data that may be part of, or exposed through, a data product. Aligns with DCAT where applicable.
        alsoKnownAs:
          en:
            - data set
            - data collection
            - source dataset
            - data resource
        relatedTerms:
          - DataProduct
          - Distribution
          - DataService
        usedIn:
          - ODPS
          - ODPC

      - id: Distribution
        uri: https://opendataproducts.org/odpv-v1.0/terms/Distribution
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Distribution
        definition:
          en: A specific accessible form of a dataset, such as a file, API response, export, or downloadable representation. Aligns with DCAT where applicable.
        alsoKnownAs:
          en:
            - data file
            - data download
            - export
            - data representation
        relatedTerms:
          - Dataset
          - DataService
          - DataAccess
        usedIn:
          - ODPS

      - id: DataService
        uri: https://opendataproducts.org/odpv-v1.0/terms/DataService
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Data Service
        definition:
          en: A service that provides access to data or data operations, such as an API, query endpoint, or data delivery service. Aligns with DCAT where applicable.
        alsoKnownAs:
          en:
            - data API
            - data endpoint
            - query service
            - delivery service
        relatedTerms:
          - Dataset
          - Distribution
          - DataAccess
        usedIn:
          - ODPS

      - id: Provider
        uri: https://opendataproducts.org/odpv-v1.0/terms/Provider
        type: role
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Provider
        definition:
          en: A person, team, organization, or system that provides or publishes a data product, dataset, distribution, or data service.
        alsoKnownAs:
          en:
            - publisher
            - supplier
            - source provider
            - data provider
        relatedTerms:
          - Owner
          - Steward
          - Consumer
        usedIn:
          - ODPS
          - ODPC
          - ODPG

      - id: Consumer
        uri: https://opendataproducts.org/odpv-v1.0/terms/Consumer
        type: role
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Consumer
        definition:
          en: A person, team, organization, system, or agent that uses or consumes a data product, dataset, distribution, or data service.
        alsoKnownAs:
          en:
            - user
            - data user
            - customer
            - recipient
            - consuming agent
        relatedTerms:
          - Provider
          - DataProduct
          - DataAccess
        usedIn:
          - ODPS
          - ODPC
          - ODPG

      - id: Owner
        uri: https://opendataproducts.org/odpv-v1.0/terms/Owner
        type: role
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Owner
        definition:
          en: A person, team, or organization accountable for a data product, catalog, dataset, service, or related object.
        alsoKnownAs:
          en:
            - accountable owner
            - product owner
            - business owner
            - asset owner
        relatedTerms:
          - Provider
          - Steward
          - Governance
        usedIn:
          - ODPS
          - ODPC

      - id: Steward
        uri: https://opendataproducts.org/odpv-v1.0/terms/Steward
        type: role
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Steward
        definition:
          en: A person, team, or organization responsible for the operational management, quality, metadata, and lifecycle of a data product or related object.
        alsoKnownAs:
          en:
            - data steward
            - product steward
            - metadata steward
            - quality steward
        relatedTerms:
          - Owner
          - Provider
          - DataQuality
        usedIn:
          - ODPS
          - ODPC

      - id: Domain
        uri: https://opendataproducts.org/odpv-v1.0/terms/Domain
        type: classification
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Domain
        definition:
          en: A business, organizational, subject, or functional area used to group data products and related objects.
        alsoKnownAs:
          en:
            - business domain
            - data domain
            - subject area
            - functional area
        relatedTerms:
          - DataProductCatalog
          - Category
          - Theme
        usedIn:
          - ODPS
          - ODPC
          - ODPG

      - id: Identifier
        uri: https://opendataproducts.org/odpv-v1.0/terms/Identifier
        type: reference
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Identifier
        definition:
          en: A stable value used to uniquely identify a vocabulary term, specification object, product, catalog item, or graph node.
        alsoKnownAs:
          en:
            - id
            - unique id
            - persistent id
            - node id
        relatedTerms:
          - Reference
          - URI
          - DataProduct
        usedIn:
          - ODPS
          - ODPC
          - ODPG

      - id: Reference
        uri: https://opendataproducts.org/odpv-v1.0/terms/Reference
        type: reference
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Reference
        definition:
          en: A link or pointer to another object, specification file, external vocabulary term, system record, or graph node.
        alsoKnownAs:
          en:
            - link
            - pointer
            - external reference
            - object reference
        relatedTerms:
          - Identifier
          - $ref
          - URI
        usedIn:
          - ODPS
          - ODPC
          - ODPG

  - id: value
    name:
      en: ODPV Value
    description:
      en: Terms used to describe why data products matter, where they create value, and how that value connects to business outcomes.
    terms:
      - id: UseCase
        uri: https://opendataproducts.org/odpv-v1.0/terms/UseCase
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Use Case
        definition:
          en: A practical business, operational, analytical, or technical scenario where one or more data products are used to create value.
        alsoKnownAs:
          en:
            - use case
            - scenario
            - business scenario
            - application case
        relatedTerms:
          - DataProduct
          - BusinessObjective
          - DataNeed
          - Outcome
        usedIn:
          - ODPC
          - ODPG

      - id: BusinessObjective
        uri: https://opendataproducts.org/odpv-v1.0/terms/BusinessObjective
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Business Objective
        definition:
          en: A business goal or intended outcome that data products, use cases, or portfolio actions support.
        alsoKnownAs:
          en:
            - objective
            - business goal
            - strategic goal
            - target outcome
        relatedTerms:
          - Outcome
          - KPI
          - Impact
          - UseCase
        usedIn:
          - ODPC
          - ODPG

      - id: KPI
        uri: https://opendataproducts.org/odpv-v1.0/terms/KPI
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: KPI
        definition:
          en: A measurable indicator used to track progress toward a business objective, outcome, or portfolio goal.
        alsoKnownAs:
          en:
            - key performance indicator
            - metric
            - performance measure
            - success measure
        relatedTerms:
          - BusinessObjective
          - Outcome
          - Impact
        usedIn:
          - ODPC
          - ODPG

      - id: Impact
        uri: https://opendataproducts.org/odpv-v1.0/terms/Impact
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Impact
        definition:
          en: The expected or observed effect created by a data product, use case, signal, or portfolio decision.
        alsoKnownAs:
          en:
            - effect
            - value impact
            - business impact
            - observed effect
        relatedTerms:
          - Outcome
          - Benefit
          - KPI
          - ValueProposition
        usedIn:
          - ODPC
          - ODPG

      - id: Signal
        uri: https://opendataproducts.org/odpv-v1.0/terms/Signal
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Signal
        definition:
          en: An observed demand, trend, risk, gap, usage pattern, policy change, market change, or operational event that may require action.
        alsoKnownAs:
          en:
            - market signal
            - demand signal
            - trigger
            - observation
        relatedTerms:
          - Demand
          - Risk
          - Gap
          - Opportunity
        usedIn:
          - ODPC
          - ODPG

      - id: Gap
        uri: https://opendataproducts.org/odpv-v1.0/terms/Gap
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Gap
        definition:
          en: A missing data product, dataset, capability, quality level, access method, relationship, or portfolio coverage area.
        alsoKnownAs:
          en:
            - missing capability
            - coverage gap
            - data gap
            - portfolio gap
        relatedTerms:
          - DataNeed
          - Opportunity
          - Signal
          - Priority
        usedIn:
          - ODPC
          - ODPG

      - id: Priority
        uri: https://opendataproducts.org/odpv-v1.0/terms/Priority
        type: classification
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Priority
        definition:
          en: A ranking or importance level used to guide portfolio planning, product development, investment, or remediation.
        alsoKnownAs:
          en:
            - importance level
            - ranking
            - urgency
            - priority level
        relatedTerms:
          - PortfolioPriority
          - Signal
          - Gap
          - Risk
        usedIn:
          - ODPC
          - ODPG

      - id: Outcome
        uri: https://opendataproducts.org/odpv-v1.0/terms/Outcome
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Outcome
        definition:
          en: A desired or achieved result connected to a business objective, use case, KPI, or impact statement.
        alsoKnownAs:
          en:
            - result
            - target result
            - achieved result
            - intended outcome
        relatedTerms:
          - BusinessObjective
          - KPI
          - Impact
          - Benefit
        usedIn:
          - ODPC
          - ODPG

      - id: DataNeed
        uri: https://opendataproducts.org/odpv-v1.0/terms/DataNeed
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Data Need
        definition:
          en: A required data input, data product, dataset, attribute, capability, or access pattern needed to support a use case or objective.
        alsoKnownAs:
          en:
            - data requirement
            - data demand
            - required data
            - information need
        relatedTerms:
          - UseCase
          - Gap
          - Demand
          - DataProduct
        usedIn:
          - ODPC
          - ODPG

      - id: Benefit
        uri: https://opendataproducts.org/odpv-v1.0/terms/Benefit
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Benefit
        definition:
          en: A positive business, operational, financial, social, or technical value expected from a data product, use case, or portfolio action.
        alsoKnownAs:
          en:
            - value
            - expected benefit
            - positive impact
            - business benefit
        relatedTerms:
          - Impact
          - Outcome
          - ValueProposition
        usedIn:
          - ODPC

      - id: Demand
        uri: https://opendataproducts.org/odpv-v1.0/terms/Demand
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Demand
        definition:
          en: Evidence of need or interest from consumers, stakeholders, systems, markets, policies, or operational processes.
        alsoKnownAs:
          en:
            - need
            - interest
            - request
            - demand signal
        relatedTerms:
          - Signal
          - DataNeed
          - Opportunity
          - UseCase
        usedIn:
          - ODPC
          - ODPG

      - id: Opportunity
        uri: https://opendataproducts.org/odpv-v1.0/terms/Opportunity
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Opportunity
        definition:
          en: A possible area for value creation, reuse, innovation, service improvement, monetization, or better decision-making.
        alsoKnownAs:
          en:
            - value opportunity
            - improvement area
            - innovation opportunity
            - reuse opportunity
        relatedTerms:
          - Signal
          - Gap
          - Benefit
          - Impact
        usedIn:
          - ODPC
          - ODPG

      - id: Risk
        uri: https://opendataproducts.org/odpv-v1.0/terms/Risk
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Risk
        definition:
          en: A possible negative event, weakness, exposure, or uncertainty that may affect data product value, trust, access, compliance, or operation.
        alsoKnownAs:
          en:
            - issue
            - exposure
            - threat
            - concern
        relatedTerms:
          - Signal
          - Priority
          - Gap
          - Governance
        usedIn:
          - ODPC
          - ODPG

      - id: ValueProposition
        uri: https://opendataproducts.org/odpv-v1.0/terms/ValueProposition
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Value Proposition
        definition:
          en: A short explanation of why a data product, use case, or portfolio item matters and what value it is expected to create.
        alsoKnownAs:
          en:
            - value statement
            - value case
            - product value
            - business value statement
        relatedTerms:
          - Benefit
          - Impact
          - Outcome
          - UseCase
        usedIn:
          - ODPS
          - ODPC

      - id: PortfolioPriority
        uri: https://opendataproducts.org/odpv-v1.0/terms/PortfolioPriority
        type: classification
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Portfolio Priority
        definition:
          en: A portfolio-level priority assigned to a data product, use case, signal, gap, or objective.
        alsoKnownAs:
          en:
            - portfolio ranking
            - portfolio importance
            - investment priority
            - planning priority
        relatedTerms:
          - Priority
          - Gap
          - Signal
          - BusinessObjective
        usedIn:
          - ODPC
          - ODPG

  - id: governance
    name:
      en: ODPV Governance
    description:
      en: Terms used to describe how data products are controlled, protected, accessed, licensed, and operated.
    terms:
      - id: DataQuality
        uri: https://opendataproducts.org/odpv-v1.0/terms/DataQuality
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Data Quality
        definition:
          en: The expected, measured, or reported quality of a data product, dataset, distribution, or data service.
        alsoKnownAs:
          en:
            - quality
            - data quality score
            - quality assessment
            - quality metrics
        relatedTerms:
          - SLA
          - DataContract
          - Stewardship
          - ComplianceRule
        usedIn:
          - ODPS
          - ODPC
          - ODPG

      - id: SLA
        uri: https://opendataproducts.org/odpv-v1.0/terms/SLA
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: SLA
        definition:
          en: A service-level agreement or expectation that defines operational commitments for a data product, distribution, or data service.
        alsoKnownAs:
          en:
            - service level agreement
            - service commitment
            - operational commitment
            - service expectation
        relatedTerms:
          - DataQuality
          - Agreement
          - AccessMethod
          - DataContract
        usedIn:
          - ODPS
          - ODPG

      - id: License
        uri: https://opendataproducts.org/odpv-v1.0/terms/License
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: License
        definition:
          en: The legal terms that define how a data product, dataset, distribution, or data service may be used, shared, or redistributed.
        alsoKnownAs:
          en:
            - data license
            - usage license
            - legal license
            - redistribution terms
        relatedTerms:
          - UsageRights
          - Agreement
          - DataAgreement
          - Policy
        usedIn:
          - ODPS
          - ODPC
          - ODPG

      - id: AccessMethod
        uri: https://opendataproducts.org/odpv-v1.0/terms/AccessMethod
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Access Method
        definition:
          en: The method used to access a data product, dataset, distribution, or data service, such as API, file download, query endpoint, or platform access.
        alsoKnownAs:
          en:
            - access channel
            - delivery method
            - access interface
            - data access method
        relatedTerms:
          - AccessCondition
          - DataService
          - Distribution
          - SLA
        usedIn:
          - ODPS
          - ODPC
          - ODPG

      - id: Agreement
        uri: https://opendataproducts.org/odpv-v1.0/terms/Agreement
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Agreement
        definition:
          en: A formal or informal agreement that defines usage, commercial, legal, operational, or governance terms for a data product or data exchange.
        alsoKnownAs:
          en:
            - data agreement
            - usage agreement
            - service agreement
            - commercial agreement
        relatedTerms:
          - DataAgreement
          - License
          - UsageRights
          - SLA
        usedIn:
          - ODPS
          - ODPC
          - ODPG

      - id: Policy
        uri: https://opendataproducts.org/odpv-v1.0/terms/Policy
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Policy
        definition:
          en: A rule, guideline, or governance statement that applies to a data product, catalog, graph, use case, access method, or related object.
        alsoKnownAs:
          en:
            - governance policy
            - rule
            - guideline
            - control policy
        relatedTerms:
          - ComplianceRule
          - GovernanceProfile
          - AccessCondition
          - Sensitivity
        usedIn:
          - ODPS
          - ODPC
          - ODPG

      - id: ComplianceRule
        uri: https://opendataproducts.org/odpv-v1.0/terms/ComplianceRule
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Compliance Rule
        definition:
          en: A specific rule or requirement used to assess, enforce, or document compliance.
        alsoKnownAs:
          en:
            - compliance requirement
            - control rule
            - regulatory rule
            - validation rule
        relatedTerms:
          - Policy
          - GovernanceProfile
          - DataQuality
          - Risk
        usedIn:
          - ODPS
          - ODPC
          - ODPG

      - id: Sensitivity
        uri: https://opendataproducts.org/odpv-v1.0/terms/Sensitivity
        type: classification
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Sensitivity
        definition:
          en: A classification that indicates how sensitive a data product, dataset, attribute, distribution, or service is from a privacy, security, commercial, or operational perspective.
        alsoKnownAs:
          en:
            - sensitivity level
            - data sensitivity
            - security classification
            - privacy classification
        relatedTerms:
          - Policy
          - AccessCondition
          - UsageRights
          - GovernanceProfile
        usedIn:
          - ODPS
          - ODPC

      - id: UsageRights
        uri: https://opendataproducts.org/odpv-v1.0/terms/UsageRights
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Usage Rights
        definition:
          en: The rights granted to consumers for using, sharing, modifying, deriving, or redistributing a data product or dataset.
        alsoKnownAs:
          en:
            - use rights
            - permitted use
            - usage permissions
            - allowed use
        relatedTerms:
          - License
          - Agreement
          - DataAgreement
          - AccessCondition
        usedIn:
          - ODPS
          - ODPC

      - id: Retention
        uri: https://opendataproducts.org/odpv-v1.0/terms/Retention
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Retention
        definition:
          en: The rules or expectations for how long data, metadata, logs, agreements, or related records should be retained.
        alsoKnownAs:
          en:
            - retention rule
            - retention period
            - record retention
            - data retention
        relatedTerms:
          - Policy
          - ComplianceRule
          - DataAgreement
          - Stewardship
        usedIn:
          - ODPS
          - ODPC

      - id: AccessCondition
        uri: https://opendataproducts.org/odpv-v1.0/terms/AccessCondition
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Access Condition
        definition:
          en: A condition that must be met before a consumer can access a data product, dataset, distribution, or data service.
        alsoKnownAs:
          en:
            - access rule
            - access requirement
            - eligibility condition
            - access constraint
        relatedTerms:
          - AccessMethod
          - UsageRights
          - Policy
          - Sensitivity
        usedIn:
          - ODPS
          - ODPC
          - ODPG

      - id: GovernanceProfile
        uri: https://opendataproducts.org/odpv-v1.0/terms/GovernanceProfile
        type: classification
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Governance Profile
        definition:
          en: A reusable governance classification that describes the expected level of control, assurance, review, or operational maturity for a data product or catalog item.
        alsoKnownAs:
          en:
            - governance level
            - assurance profile
            - control profile
            - maturity profile
        relatedTerms:
          - Policy
          - ComplianceRule
          - Sensitivity
          - Stewardship
        usedIn:
          - ODPS
          - ODPC

      - id: DataAgreement
        uri: https://opendataproducts.org/odpv-v1.0/terms/DataAgreement
        type: object
        status: stable
        introducedIn: 1.0.0
        preferredLabel:
          en: Data Agreement
        definition:
          en: A structured agreement that defines the allowed use, responsibilities, obligations, and constraints for a data product or data exchange.
        alsoKnownAs:
          en:
            - data sharing agreement
            - data usage agreement
            - data exchange agreement
            - product agreement
